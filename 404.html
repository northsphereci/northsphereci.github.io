<!DOCTYPE html>
<html>
<head>
  <script>
    var path = window.location.pathname;
    // If no extension, try adding .html and redirect
    if (path.slice(-1) !== '/' && path.indexOf('.') === -1) {
      window.location.replace(path + '.html');
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
